<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cash Expense Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4f8; --card: #ffffff; --primary: #1a4a7a; --accent: #2e7d32;
    --danger: #c62828; --text: #1a1a2e; --muted: #6b7280; --border: #d1d9e0;
    --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }
  header { background: var(--primary); color: white; padding: 20px 20px 24px; text-align: center; }
  header h1 { font-size: 18px; font-weight: 700; }
  header p { font-size: 12px; opacity: 0.7; margin-top: 4px; }

  #setup-banner { background: #fff3cd; border-left: 4px solid #f59e0b; margin: 16px; padding: 14px 16px; border-radius: 10px; font-size: 13px; line-height: 1.6; }
  #setup-banner strong { color: #92400e; }
  #setup-banner input { width: 100%; margin-top: 10px; padding: 10px 12px; border: 1.5px solid #d1d9e0; border-radius: 8px; font-size: 13px; font-family: monospace; }
  #setup-banner button { margin-top: 8px; background: #f59e0b; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; }

  .tabs { display: flex; margin: 16px 16px 0; gap: 8px; }
  .tab { flex: 1; padding: 11px; border: 2px solid var(--border); border-radius: 10px; background: white; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; text-align: center; }
  .tab.active { border-color: var(--primary); background: var(--primary); color: white; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin: 16px; padding: 20px; }
  .card h2 { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1.5px solid var(--border); }

  .company-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 18px; }
  .company-btn { padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; background: white; text-align: left; cursor: pointer; transition: all 0.15s; }
  .company-btn .name { font-size: 14px; font-weight: 600; color: var(--text); }
  .company-btn .abn { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .company-btn.selected { border-color: var(--primary); background: #eef4ff; }
  .company-btn.selected .name { color: var(--primary); }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

  .week-picker { display: flex; align-items: center; gap: 10px; }
  .week-nav { background: var(--primary); color: white; border: none; border-radius: 8px; width: 38px; height: 38px; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .week-display { flex: 1; background: #fafbfc; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 600; text-align: center; color: var(--text); }
  .week-display .week-sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; }

  .amount-wrap { display: flex; align-items: center; gap: 10px; }
  .amount-wrap span { font-size: 16px; color: var(--muted); font-weight: 600; flex-shrink: 0; }
  .amount-wrap input { flex: 1; }

  .field input[type="number"], .field textarea, .field select {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 16px; color: var(--text); background: #fafbfc; -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--primary); background: white; }
  .field textarea { height: 72px; resize: none; font-size: 14px; }

  #submit-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
  #submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }

  /* EXPORT TAB */
  .export-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .export-row .field { flex: 1; margin-bottom: 0; }
  #export-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; }
  #export-btn:disabled { background: #9ca3af; cursor: not-allowed; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; }
  .modal h3 { font-size: 16px; font-weight: 700; color: var(--danger); margin-bottom: 12px; }
  .modal p { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 20px; }
  .modal p strong { color: var(--primary); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 13px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: #f3f4f6; color: var(--muted); }
  .btn-overwrite { background: var(--danger); color: white; }

  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--danger); }

  .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .entry-row:last-child { border-bottom: none; }
  .entry-row .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .entry-row .amount { font-weight: 700; color: var(--accent); font-size: 15px; }
  .empty-state { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>💰 Cash Expense Tracker</h1>
  <p>Weekly entry · 3 companies · AUD</p>
</header>

<div id="setup-banner">
  <strong>⚙️ One-time setup:</strong> 粘贴你的 Google Apps Script URL：
  <input type="url" id="script-url-input" placeholder="https://script.google.com/macros/s/..." />
  <button onclick="saveScriptUrl()">Save & Connect</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('entry')">📝 录入</button>
  <button class="tab" onclick="switchTab('export')">📊 导出报表</button>
</div>

<!-- ENTRY TAB -->
<div id="tab-entry" class="tab-content active">
  <div class="card">
    <h2>New Expense Entry</h2>
    <div class="field">
      <label>Company</label>
      <div class="company-grid">
        <button class="company-btn" onclick="selectCompany(this, 'OCEAN BLOOM PTY LTD')">
          <div class="name">OCEAN BLOOM PTY LTD</div>
          <div class="abn">ABN 50 677 724 668</div>
        </button>
        <button class="company-btn" onclick="selectCompany(this, 'TRIANGLE SHALLOTS PTY LTD')">
          <div class="name">TRIANGLE SHALLOTS PTY LTD</div>
          <div class="abn">ABN 39 619 455 131</div>
        </button>
        <button class="company-btn" onclick="selectCompany(this, 'SNOWMAN GROUP PTY LTD')">
          <div class="name">SNOWMAN GROUP PTY LTD</div>
          <div class="abn">ABN 98 657 752 255</div>
        </button>
      </div>
    </div>
    <div class="field">
      <label>Week</label>
      <div class="week-picker">
        <button class="week-nav" onclick="changeWeek(-1)">‹</button>
        <div class="week-display">
          <div id="week-label">Loading...</div>
          <div class="week-sub" id="week-sub"></div>
        </div>
        <button class="week-nav" onclick="changeWeek(1)">›</button>
      </div>
    </div>
    <div class="field">
      <label>Amount (AUD)</label>
      <div class="amount-wrap">
        <span>$</span>
        <input type="number" id="entry-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
      </div>
    </div>
    <div class="field">
      <label>Description (optional)</label>
      <textarea id="entry-desc" placeholder="e.g. Supplier payment, wages..."></textarea>
    </div>
    <button id="submit-btn" onclick="submitEntry()">Save Expense</button>
  </div>

  <div class="card">
    <h2>Recent Entries (this session)</h2>
    <div id="recent-list"><div class="empty-state">No entries yet this session.</div></div>
  </div>
</div>

<!-- EXPORT TAB -->
<div id="tab-export" class="tab-content">
  <div class="card">
    <h2>Export Quarterly Report</h2>
    <div class="export-row">
      <div class="field">
        <label>Financial Year</label>
        <select id="export-fy"></select>
      </div>
      <div class="field">
        <label>Quarter</label>
        <select id="export-q">
          <option value="Q1">Q1 (Jul–Sep)</option>
          <option value="Q2">Q2 (Oct–Dec)</option>
          <option value="Q3">Q3 (Jan–Mar)</option>
          <option value="Q4">Q4 (Apr–Jun)</option>
        </select>
      </div>
    </div>
    <button id="export-btn" onclick="exportReport()">📥 Download Excel Report</button>
  </div>
</div>

<!-- DUPLICATE MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>⚠️ Duplicate Entry</h3>
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-overwrite" onclick="confirmOverwrite()">Overwrite</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  let selectedCompany = '';
  let recentEntries = [];
  let currentMonday = getMonday(new Date());
  let pendingPayload = null;

  // --- WEEK PICKER ---
  function getMonday(d) {
    const date = new Date(d);
    const day = date.getDay();
    const diff = (day === 0) ? -6 : 1 - day;
    date.setDate(date.getDate() + diff);
    date.setHours(0,0,0,0);
    return date;
  }
  function formatDate(d) {
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  }
  function getFYQuarter(date) {
    const month = date.getMonth() + 1;
    const year = date.getFullYear();
    const fy = (month >= 7) ? year + 1 : year;
    let q;
    if (month >= 7 && month <= 9) q = 'Q1';
    else if (month >= 10) q = 'Q2';
    else if (month <= 3) q = 'Q3';
    else q = 'Q4';
    return { fy, q };
  }
  function updateWeekDisplay() {
    const sunday = new Date(currentMonday);
    sunday.setDate(sunday.getDate() + 6);
    document.getElementById('week-label').textContent = formatDate(currentMonday) + ' – ' + formatDate(sunday);
    const { fy, q } = getFYQuarter(currentMonday);
    document.getElementById('week-sub').textContent = `FY${fy} ${q}`;
  }
  function changeWeek(dir) {
    currentMonday.setDate(currentMonday.getDate() + dir * 7);
    updateWeekDisplay();
  }
  updateWeekDisplay();

  // --- FY DROPDOWN ---
  function populateFYDropdown() {
    const sel = document.getElementById('export-fy');
    const thisYear = new Date().getFullYear();
    const { fy: currentFY } = getFYQuarter(new Date());
    for (let y = currentFY; y >= currentFY - 3; y--) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = `FY${y} (${y-1}–${y})`;
      sel.appendChild(opt);
    }
    // Set current quarter
    const { q } = getFYQuarter(new Date());
    document.getElementById('export-q').value = q;
  }
  populateFYDropdown();

  // --- SETUP ---
  window.addEventListener('load', () => {
    const url = 'https://script.google.com/macros/s/AKfycbzPbNXdQc9WmWcrpCHf-QHQ-8NY-zl83NG0l20vZoG_WjTdAcvG8cd-_4WgqkRA_cHYiw/exec';
    document.getElementById('setup-banner').style.display = 'none';
  });
  function saveScriptUrl() {
    const url = document.getElementById('script-url-input').value.trim();
    if (!url.startsWith('https://script.google.com')) { showToast('请输入正确的Apps Script URL', true); return; }
    localStorage.setItem('gas_url', url);
    document.getElementById('setup-banner').style.display = 'none';
    showToast('✅ 已连接Google Sheets！');
  }

  // --- TABS ---
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
  }

  // --- COMPANY ---
  function selectCompany(btn, name) {
    document.querySelectorAll('.company-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCompany = name;
  }

  function toLocalDateStr(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  // --- SUBMIT ---
  async function submitEntry() {
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbzPbNXdQc9WmWcrpCHf-QHQ-8NY-zl83NG0l20vZoG_WjTdAcvG8cd-_4WgqkRA_cHYiw/exec';
    if (!scriptUrl) { showToast('请先设置Google Sheets URL', true); return; }
    if (!selectedCompany) { showToast('请选择公司', true); return; }
    const amount = parseFloat(document.getElementById('entry-amount').value);
    const desc = document.getElementById('entry-desc').value.trim();
    if (!amount || amount <= 0) { showToast('请输入正确金额', true); return; }

    const weekStartStr = toLocalDateStr(currentMonday);
    const sunday = new Date(currentMonday);
    sunday.setDate(sunday.getDate() + 6);
    const weekEndStr = toLocalDateStr(sunday);

    const payload = { company: selectedCompany, weekStart: weekStartStr, weekEnd: weekEndStr, amount, description: desc };

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Checking...';

    try {
      // Check for duplicate via GET (avoids CORS preflight)
      const checkRes = await fetch(
        `${scriptUrl}?action=check&company=${encodeURIComponent(selectedCompany)}&weekStart=${weekStartStr}&_=${Date.now()}`,
        { method: 'GET', mode: 'cors' }
      );
      const checkData = await checkRes.json();

      if (checkData.exists) {
        pendingPayload = { ...payload, action: 'overwrite' };
        const sunday = new Date(currentMonday); sunday.setDate(sunday.getDate() + 6);
        document.getElementById('modal-msg').innerHTML =
          `<strong>${selectedCompany}</strong><br>${formatDate(currentMonday)} – ${formatDate(sunday)}<br><br>已有记录：<strong>$${parseFloat(checkData.amount).toFixed(2)}</strong>${checkData.description ? ' (' + checkData.description + ')' : ''}<br><br>确定要覆盖吗？`;
        document.getElementById('modal').classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Save Expense';
        return;
      }

      await saveEntry({ ...payload, action: 'new' });
    } catch(err) {
      showToast('连接失败，请检查网络或Script URL', true);
    }

    btn.disabled = false;
    btn.textContent = 'Save Expense';
  }

  async function confirmOverwrite() {
    closeModal();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';
    await saveEntry(pendingPayload);
    btn.disabled = false;
    btn.textContent = 'Save Expense';
  }

  async function saveEntry(payload) {
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbzPbNXdQc9WmWcrpCHf-QHQ-8NY-zl83NG0l20vZoG_WjTdAcvG8cd-_4WgqkRA_cHYiw/exec';
    try {
      const params = new URLSearchParams({
        action: payload.action,
        company: payload.company,
        weekStart: payload.weekStart,
        weekEnd: payload.weekEnd,
        amount: payload.amount,
        description: payload.description || '',
        _: Date.now()
      });
      const res = await fetch(`${scriptUrl}?${params}`, { method: 'GET', mode: 'cors' });
      const result = await res.json();
      if (result.success) {
        recentEntries.unshift(payload);
        renderRecent();
        document.getElementById('entry-amount').value = '';
        document.getElementById('entry-desc').value = '';
        document.querySelectorAll('.company-btn').forEach(b => b.classList.remove('selected'));
        selectedCompany = '';
        showToast('✅ 已保存到Google Sheets！');
      } else {
        showToast('保存失败：' + (result.error || '未知错误'), true);
      }
    } catch(err) {
      showToast('连接失败，请检查网络', true);
    }
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    pendingPayload = null;
  }

  // --- EXPORT ---
  async function exportReport() {
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbzPbNXdQc9WmWcrpCHf-QHQ-8NY-zl83NG0l20vZoG_WjTdAcvG8cd-_4WgqkRA_cHYiw/exec';
    if (!scriptUrl) { showToast('请先设置Google Sheets URL', true); return; }

    const fy = document.getElementById('export-fy').value;
    const q = document.getElementById('export-q').value;
    const label = `FY${fy} ${q}`;

    const btn = document.getElementById('export-btn');
    btn.disabled = true;
    btn.textContent = 'Loading data...';

    try {
      const res = await fetch(scriptUrl + '?action=get', { method: 'GET', mode: 'cors' });
      const data = await res.json();

      const filtered = data.rows.filter(r => r.fyQuarter === label);

      const companies = ['OCEAN BLOOM PTY LTD', 'TRIANGLE SHALLOTS PTY LTD', 'SNOWMAN GROUP PTY LTD'];
      const wb = XLSX.utils.book_new();

      // Summary sheet
      const summaryData = [['Week Starting', 'Week Ending', ...companies, 'Total']];
      const weekMap = {};
      filtered.forEach(r => {
        if (!weekMap[r.weekStart]) weekMap[r.weekStart] = { weekEnd: r.weekEnd };
        weekMap[r.weekStart][r.company] = r.amount;
      });
      const weeks = Object.keys(weekMap).sort();
      let totals = { 'OCEAN BLOOM PTY LTD': 0, 'TRIANGLE SHALLOTS PTY LTD': 0, 'SNOWMAN GROUP PTY LTD': 0 };
      weeks.forEach(w => {
        const row = [w, weekMap[w].weekEnd];
        let rowTotal = 0;
        companies.forEach(c => {
          const amt = weekMap[w][c] || 0;
          row.push(amt);
          totals[c] += amt;
          rowTotal += amt;
        });
        row.push(rowTotal);
        summaryData.push(row);
      });
      const grandTotal = companies.reduce((s, c) => s + totals[c], 0);
      summaryData.push(['TOTAL', '', ...companies.map(c => totals[c]), grandTotal]);

      const ws = XLSX.utils.aoa_to_sheet(summaryData);
      ws['!cols'] = [{ wch: 14 }, { wch: 14 }, { wch: 26 }, { wch: 26 }, { wch: 22 }, { wch: 10 }];
      XLSX.utils.book_append_sheet(wb, ws, `${label} Summary`);

      // Individual sheets
      companies.forEach(company => {
        const compRows = filtered.filter(r => r.company === company);
        const sheetData = [['Week Starting', 'Week Ending', 'Amount (AUD)', 'Description']];
        let total = 0;
        compRows.sort((a,b) => a.weekStart.localeCompare(b.weekStart)).forEach(r => {
          sheetData.push([r.weekStart, r.weekEnd, r.amount, r.description || '']);
          total += parseFloat(r.amount);
        });
        sheetData.push(['TOTAL', '', total, '']);
        const ws2 = XLSX.utils.aoa_to_sheet(sheetData);
        ws2['!cols'] = [{ wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 30 }];
        const shortName = company.replace(' PTY LTD','').substring(0,20);
        XLSX.utils.book_append_sheet(wb, ws2, shortName);
      });

      XLSX.writeFile(wb, `Cash_Expense_${label.replace(' ','_')}.xlsx`);
      showToast('✅ 报表已下载！');
    } catch(err) {
      showToast('导出失败，请检查连接', true);
    }

    btn.disabled = false;
    btn.textContent = '📥 Download Excel Report';
  }

  // --- RECENT ---
  function renderRecent() {
    const list = document.getElementById('recent-list');
    if (recentEntries.length === 0) { list.innerHTML = '<div class="empty-state">No entries yet this session.</div>'; return; }
    list.innerHTML = recentEntries.slice(0, 5).map(e => {
      const mon = new Date(e.weekStart + 'T00:00:00');
      const sun = new Date(e.weekEnd + 'T00:00:00');
      return `<div class="entry-row">
        <div>
          <div>${e.company.replace(' PTY LTD','')}</div>
          <div class="meta">${formatDate(mon)} – ${formatDate(sun)}${e.description ? ' · ' + e.description : ''}</div>
        </div>
        <div class="amount">$${parseFloat(e.amount).toFixed(2)}</div>
      </div>`;
    }).join('');
  }

  // --- TOAST ---
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error show' : 'show';
    setTimeout(() => t.className = '', 2800);
  }
</script>
</body>
</html>
